<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code & Learn: Aventura Educativa</title>
    <!-- Tailwind CSS para estilização rápida, responsiva e fluida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts para um visual amigável ao público infantil (Ensino Fundamental) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        // Configuração do Tailwind para cores personalizadas
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        senaiBlue: '#005baa',
                        senaiRed: '#e31c23',
                        gameYellow: '#FFD166',
                        gameGreen: '#06D6A0',
                        gamePurple: '#8338EC'
                    }
                }
            }
        }
    </script>

    <style>
        /* Animações CSS customizadas para feedback visual (Juiciness) */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(3deg); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.3s ease-in-out;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Fundo lúdico e animado */
        body {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800 font-sans">

    <!-- Container Principal do Jogo -->
    <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white transition-all duration-500">
        
        <!-- TELA 1: CADASTRO DO ALUNO (Coleta de Dados) -->
        <div id="login-screen" class="p-8 flex flex-col items-center justify-center space-y-6">
            <div class="text-6xl animate-float">🚀</div>
            <h1 class="text-3xl font-black text-center text-senaiBlue tracking-tight">
                Aventura do Conhecimento
            </h1>
            <p class="text-center text-gray-500 font-bold">Prepare-se para jogar e aprender!</p>

            <form id="studentForm" class="w-full space-y-4" onsubmit="startGame(event)">
                <!-- Coleta: Nome -->
                <div>
                    <label for="studentName" class="block text-sm font-bold text-gray-700 mb-1">Qual é o seu nome?</label>
                    <input type="text" id="studentName" required autocomplete="off"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-gamePurple focus:ring-2 focus:ring-gamePurple focus:outline-none transition-colors text-lg font-bold text-gray-700 placeholder-gray-400"
                        placeholder="Ex: Joãozinho">
                </div>

                <!-- Coleta: Série -->
                <div>
                    <label for="studentGrade" class="block text-sm font-bold text-gray-700 mb-1">Em qual ano você está?</label>
                    <select id="studentGrade" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-gamePurple focus:ring-2 focus:ring-gamePurple focus:outline-none transition-colors text-lg font-bold text-gray-700 appearance-none bg-white">
                        <option value="" disabled selected>Selecione seu ano...</option>
                        <option value="1º Ano">1º Ano do Fundamental</option>
                        <option value="2º Ano">2º Ano do Fundamental</option>
                        <option value="3º Ano">3º Ano do Fundamental</option>
                        <option value="4º Ano">4º Ano do Fundamental</option>
                        <option value="5º Ano">5º Ano do Fundamental</option>
                        <option value="6º Ano">6º Ano do Fundamental</option>
                        <option value="7º Ano">7º Ano do Fundamental</option>
                        <option value="8º Ano">8º Ano do Fundamental</option>
                        <option value="9º Ano">9º Ano do Fundamental</option>
                    </select>
                </div>

                <!-- Botão de Ação -->
                <button type="submit" 
                    class="w-full bg-gameGreen hover:bg-green-500 text-white font-black text-xl py-4 rounded-xl shadow-[0_6px_0_#049c74] hover:shadow-[0_4px_0_#049c74] hover:translate-y-[2px] transition-all active:shadow-none active:translate-y-[6px]">
                    COMEÇAR AVENTURA! 🎮
                </button>
            </form>
        </div>

        <!-- TELA 2: DASHBOARD/JOGO (Apresentação dos Dados) -->
        <div id="game-screen" class="hidden p-6 flex flex-col items-center justify-between min-h-[500px]">
            
            <!-- Cabeçalho com Informações do Aluno -->
            <div class="w-full bg-blue-50 rounded-2xl p-4 flex justify-between items-center border-2 border-blue-100 shadow-inner">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-gamePurple text-white rounded-full flex items-center justify-center text-2xl font-black shadow-md" id="avatarLetter">
                        J
                    </div>
                    <div>
                        <h2 class="font-black text-lg text-gray-800 leading-tight truncate max-w-[150px]" id="displayName">Nome</h2>
                        <span class="text-xs font-bold text-senaiBlue bg-blue-100 px-2 py-1 rounded-md" id="displayGrade">Série</span>
                    </div>
                </div>
                <!-- Botão Logout Mínimo -->
                <button onclick="logout()" class="text-gray-400 hover:text-senaiRed transition-colors" title="Trocar Aluno">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>

            <!-- Área de Pontuação Central -->
            <div class="flex flex-col items-center justify-center flex-grow w-full my-6">
                <p class="text-gray-500 font-bold uppercase tracking-widest text-sm mb-2">Seus Pontos de XP</p>
                <div id="scoreContainer" class="bg-gameYellow w-40 h-40 rounded-full flex items-center justify-center border-8 border-yellow-300 shadow-xl relative transition-transform">
                    <span class="absolute -top-2 -right-2 text-4xl">⭐</span>
                    <h1 id="scoreDisplay" class="text-6xl font-black text-yellow-900 drop-shadow-md">0</h1>
                </div>
            </div>

            <!-- Mecânica Simulada do Jogo (Gatilho de Pontuação) -->
            <div class="w-full bg-gray-50 p-6 rounded-3xl border-2 border-gray-100 text-center">
                <p class="text-sm font-bold text-gray-600 mb-4">Resolva o desafio e ganhe pontos!</p>
                <button onclick="addScore()" id="actionButton"
                    class="w-full bg-senaiBlue hover:bg-blue-600 text-white font-black text-lg py-4 rounded-xl shadow-[0_6px_0_#003f75] hover:shadow-[0_4px_0_#003f75] hover:translate-y-[2px] transition-all active:shadow-none active:translate-y-[6px]">
                    RESPONDER CERTO! 🧠
                </button>
            </div>
            
            <p class="text-xs text-gray-400 mt-4 font-bold">Os dados estão salvos no seu navegador!</p>

        </div>

    </div>

    <!-- LÓGICA JAVASCRIPT (Codificação de Sistemas) -->
    <script>
        // Referências do DOM (Document Object Model)
        const loginScreen = document.getElementById('login-screen');
        const gameScreen = document.getElementById('game-screen');
        const studentNameInput = document.getElementById('studentName');
        const studentGradeInput = document.getElementById('studentGrade');
        
        // Elementos de exibição na tela do jogo
        const displayName = document.getElementById('displayName');
        const displayGrade = document.getElementById('displayGrade');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreContainer = document.getElementById('scoreContainer');
        const avatarLetter = document.getElementById('avatarLetter');

        // Estado do Jogo (Variáveis em memória)
        let currentScore = 0;

        // Ao carregar a página, verifica se já existe um aluno salvo
        window.onload = () => {
            checkStorage();
        };

        function checkStorage() {
            // Acessando o Local Storage do Browser
            const savedName = localStorage.getItem('game_studentName');
            const savedGrade = localStorage.getItem('game_studentGrade');
            const savedScore = localStorage.getItem('game_studentScore');

            if (savedName && savedGrade) {
                // Aluno já logado, carregar dados
                displayName.textContent = savedName;
                displayGrade.textContent = savedGrade;
                avatarLetter.textContent = savedName.charAt(0).toUpperCase();
                
                // Tratar a pontuação (se for null, começa com 0)
                currentScore = savedScore ? parseInt(savedScore) : 0;
                scoreDisplay.textContent = currentScore;

                // Alternar telas
                loginScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                gameScreen.classList.add('flex');
            } else {
                // Nenhum aluno logado, mostrar tela inicial
                gameScreen.classList.add('hidden');
                gameScreen.classList.remove('flex');
                loginScreen.classList.remove('hidden');
            }
        }

        // Função para cadastrar e iniciar (Acionada no submit do form)
        function startGame(event) {
            event.preventDefault(); // Evita recarregar a página

            const name = studentNameInput.value.trim();
            const grade = studentGradeInput.value;

            if (name === '' || grade === '') return;

            // Salvar no Browser (Local Storage)
            localStorage.setItem('game_studentName', name);
            localStorage.setItem('game_studentGrade', grade);
            localStorage.setItem('game_studentScore', '0'); // Inicia com 0

            // Limpar formulário
            studentNameInput.value = '';
            studentGradeInput.value = '';

            // Atualizar UI
            checkStorage();
        }

        // Mecânica principal: Adicionar Pontos e Salvar
        function addScore() {
            currentScore += 10; // Adiciona 10 pontos por clique/acerto
            
            // Atualiza a memória visual
            scoreDisplay.textContent = currentScore;
            
            // Persiste no Local Storage
            localStorage.setItem('game_studentScore', currentScore.toString());

            // Animação de Feedback (Juiciness)
            scoreContainer.classList.remove('animate-pop');
            // Força um reflow (recalcula o CSS) para reiniciar a animação
            void scoreContainer.offsetWidth; 
            scoreContainer.classList.add('animate-pop');
        }

        // Função para apagar os dados e sair
        function logout() {
            if(confirm("Tem certeza que deseja sair? Todo o progresso será apagado!")) {
                localStorage.removeItem('game_studentName');
                localStorage.removeItem('game_studentGrade');
                localStorage.removeItem('game_studentScore');
                currentScore = 0;
                checkStorage();
            }
        }
    </script>
</body>
</html>
